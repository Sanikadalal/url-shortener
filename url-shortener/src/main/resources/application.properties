spring.application.name=url-shortener

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/url-shortener}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

jwt.secret=${JWT_SECRET:mysupersecretkeyforjwtauthentication2026springbootproject}
jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}

logging.level.org.springframework.security=DEBUG
frontend.url=${FRONTEND_URL:https://url-shortener-dusky-two.vercel.app/}